'.+':
   common:
   ops:
#   nrpe:
   sunet::nagios::nrpe:
    checks:
    - nrpe_check_apt
    - nrpe_check_dynamic_disk
    - nrpe_check_entropy
    - nrpe_check_load
    - nrpe_check_memory
    - nrpe_check_ntp_time
    - nrpe_check_reboot
    - nrpe_check_scriptherder
    - nrpe_check_total_procs_lax
    - nrpe_check_uptime
    - nrpe_check_users
    - nrpe_check_zombie_procs
   sunet::updater:
      cron: true
      cosmos_automatic_reboot: true
   sunet::server:
      fail2ban: true
      unattended_upgrades: true
      disable_ipv6_privacy: true
      disable_all_local_users: true
      ssh_allow_from_anywhere: false
   entropyclient:
   infra_ca_rp:
   mailclient:
      domain: sunet.se
   sunet::rsyslog:
   update_ca_certificates:
   sunet::invent::client:
      export_endpoint: https://ni-frontend-test.sunet.se
      invent_retention_days: 1

'^md-[1-2]\.thiss\.io$':
   sunet_iaas_cloud:
   sunet::dockerhost2:
   thiss::mdq_beta:
      version: 1.5.8
      src: https://a-1.thiss.io/metadata.json
      src_trust: https://a-1.thiss.io/metadata_sp.json
      base_url: https://md.thiss.io
      post: /usr/sbin/service sunet-thiss-mdq restart
   https:
   http:
   sunet::fleetlock_client:
   thiss::fleetlock_healthcheck:

md-lb.thiss.io:
   sunet::dockerhost2:
   thiss::haproxy_md:
      image_tag: beta
      location: thiss

a-1.thiss.io:
   sunet_iaas_cloud:
   sunet::dockerhost2:
   thiss::pyff_beta:
      pyff_version: eidas-2.1.3-stable
      output: /var/www/html/metadata.json
      output_trust: /var/www/html/metadata_sp.json
   thiss::md_publisher_beta:
      watch: /var/www/html/metadata.json
      watch_sp: /var/www/html/metadata_sp.json
      imagetag: v2024-04-08-01
   md_aggregator:
   https:

'^static-[0-9]+\.thiss\.io$':
   sunet_iaas_cloud:
