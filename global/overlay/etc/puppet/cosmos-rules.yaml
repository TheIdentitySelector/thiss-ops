monitor.ntx.sunet.eu.seamlessaccess.org:
   nagios_monitor:

monitor.se-east.sunet.eu.seamlessaccess.org:
  sunet::dockerhost2:
  thiss::naemon_monitor_config:
  sunet::naemon_monitor:
    domain: monitor.seamlessaccess.org
    naemon_tag: v2025-11-03-01
    thruk_tag: v2025-11-03-02
    histou_tag: latest
    nagflux_tag: latest
    naemon_extra_volumes:
      - /etc/ssl/certs/infra.crt:/etc/ssl/certs/infra.crt:ro
      - /etc/ssl/certs/infra-2-prod.crt:/etc/ssl/certs/infra-2-prod.crt:ro
      - /usr/lib/nagios/plugins/check_md_sp_sa.sh:/usr/lib/nagios/plugins/check_md_sp_sa.sh:ro
      - /usr/lib/nagios/plugins/check_haproxy.rb:/usr/lib/nagios/plugins/check_haproxy.rb:ro
      - /usr/lib/nagios/plugins/check_md_sa.sh:/usr/lib/nagios/plugins/check_md_sa.sh:ro
    receive_otel: true
    otel_retention: '8760h'
    thruk_admins:
    - mariah@sunet.se
    - jonas@sunet.se
    - thorslund@sunet.se
    - santesson@sunet.se
    thruk_users:
    - '*@sunet.se'
    default_host_group: sunet::nagios::nrpe
    nrpe_group: sunet::nagios::nrpe
  sunet::otel::alloy:
    enabled: false
    otel_receiver: "just-some-string-to-make-class-happy"

